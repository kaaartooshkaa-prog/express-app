services:
  app:
    image: kartoshkaa/express-app:latest
    ports:
      - "8080:8080"
    restart: always

  watchtower:
    image: containrrr/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=20
      - DOCKER_API_VERSION=1.44
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
